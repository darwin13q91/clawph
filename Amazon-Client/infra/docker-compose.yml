# Amazon-Client Docker Compose
# Deploys isolated containers for each client

version: '3.8'

services:
  # Shared infrastructure
  nginx:
    image: nginx:alpine
    container_name: amazon-clients-proxy
    ports:
      - "9000:80"  # Main entry point
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: amazon-clients-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Client: Demo Corp
  demo-inventory-bot:
    image: openclaw/agent:latest
    container_name: demo-inventory-bot
    environment:
      - CLIENT_ID=demo
      - AGENT_TYPE=inventory
      - REDIS_URL=redis:6379
    volumes:
      - ./clients/client-demo/config:/app/config:ro
      - ./clients/client-demo/data:/app/data
      - ./shared-skills:/app/skills/shared:ro
    restart: unless-stopped
    depends_on:
      - redis

  demo-pricing-bot:
    image: openclaw/agent:latest
    container_name: demo-pricing-bot
    environment:
      - CLIENT_ID=demo
      - AGENT_TYPE=pricing
      - REDIS_URL=redis:6379
    volumes:
      - ./clients/client-demo/config:/app/config:ro
      - ./clients/client-demo/data:/app/data
      - ./shared-skills:/app/skills/shared:ro
    restart: unless-stopped
    depends_on:
      - redis

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: amazon-clients-metrics
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: amazon-clients-dashboard
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: amazon-clients-network
