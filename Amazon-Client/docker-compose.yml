# Amazon-Client Service Infrastructure
# Multi-tenant Docker Compose for Amazon Seller Central Automation
# Target: 20-50 local business clients

version: '3.8'

services:
  # ============================================================================
  # NGINX REVERSE PROXY
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: ac-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./shared/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./shared/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./shared/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - ac-network
    depends_on:
      - sp-api-gateway
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # SHARED SP-API GATEWAY SERVICE
  # ============================================================================
  sp-api-gateway:
    build:
      context: ./shared/sp-api
      dockerfile: Dockerfile
    container_name: ac-sp-api-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY}
      - RATE_LIMIT_ENABLED=true
      - MAX_REQUESTS_PER_SECOND=20
    volumes:
      - ./shared/sp-api:/app
      - ./clients/secrets:/app/secrets:ro
      - sp-api-logs:/app/logs
    networks:
      - ac-network
    depends_on:
      - redis
      - postgres-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Resource limits for $5/month VPS scalability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # REDIS CACHE & RATE LIMITING
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ac-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
      - ./shared/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ac-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # SHARED POSTGRES (for gateway metadata, not client data)
  # ============================================================================
  postgres-shared:
    image: postgres:15-alpine
    container_name: ac-postgres-shared
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ac_admin
      - POSTGRES_PASSWORD=${SHARED_DB_PASSWORD}
      - POSTGRES_DB=ac_gateway
    volumes:
      - postgres-shared-data:/var/lib/postgresql/data
      - ./shared/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ac-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # CLIENT DATABASES (Template - instantiated per client)
  # Each client gets: postgres-client-{client_id}
  # ============================================================================
  # Example client DBs (created via onboard-client.sh):
  # postgres-client-001:
  #   image: postgres:15-alpine
  #   container_name: ac-postgres-client-001
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=client_001
  #     - POSTGRES_PASSWORD=${CLIENT_001_DB_PASSWORD}
  #     - POSTGRES_DB=client_001_data
  #   volumes:
  #     - postgres-client-001-data:/var/lib/postgresql/data
  #   networks:
  #     - ac-network

  # ============================================================================
  # BOT SERVICES (Template - instantiated per client/tier)
  # ============================================================================
  
  # INVENTORY BOT - Base Service
  inventory-bot:
    build:
      context: ./bots/inventory-bot
      dockerfile: Dockerfile
    container_name: ac-inventory-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template  # Not started directly, cloned per client
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # PRICING BOT - Base Service
  pricing-bot:
    build:
      context: ./bots/pricing-bot
      dockerfile: Dockerfile
    container_name: ac-pricing-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # REVIEW BOT - Base Service
  review-bot:
    build:
      context: ./bots/review-bot
      dockerfile: Dockerfile
    container_name: ac-review-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # COMPETITOR BOT - Base Service
  competitor-bot:
    build:
      context: ./bots/competitor-bot
      dockerfile: Dockerfile
    container_name: ac-competitor-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # CUSTOMER SERVICE BOT - Base Service
  customer-service-bot:
    build:
      context: ./bots/customer-service-bot
      dockerfile: Dockerfile
    container_name: ac-customer-service-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ANALYTICS BOT - Base Service
  analytics-bot:
    build:
      context: ./bots/analytics-bot
      dockerfile: Dockerfile
    container_name: ac-analytics-bot-template
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SP_API_GATEWAY=http://sp-api-gateway:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - ac-network
    profiles:
      - template
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # MONITORING (Lightweight for VPS constraints)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ac-prometheus
    restart: unless-stopped
    volumes:
      - ./shared/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ac-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  ac-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  nginx-logs:
  sp-api-logs:
  redis-data:
  postgres-shared-data:
  prometheus-data:
  # Client volumes created dynamically via onboard-client.sh
