# Redis Configuration for Amazon-Client
# Optimized for low-memory VPS deployment

# Memory management
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (lightweight for VPS)
save 900 1
save 300 10
save 60 10000

# Append only file
appendonly yes
appendfsync everysec

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Logging
loglevel notice

# Connections
tcp-keepalive 300
timeout 0

# Performance
databases 4
