<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Systems Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent-primary: #58a6ff;
            --accent-success: #238636;
            --accent-warning: #f0883e;
            --accent-danger: #da3633;
            --accent-info: #2f81f7;
            --font-mono: 'SF Mono', Monaco, Inconsolata, 'Roboto Mono', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), #a371f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: var(--accent-danger);
        }

        .status-dot.warning {
            background: var(--accent-warning);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .card-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 1.25rem;
        }

        /* Metrics */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .metric {
            text-align: center;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .metric-value.success { color: var(--accent-success); }
        .metric-value.warning { color: var(--accent-warning); }
        .metric-value.danger { color: var(--accent-danger); }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Status Items */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 0.875rem;
        }

        .status-item-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-icon.online { background: var(--accent-success); }
        .status-icon.offline { background: var(--accent-danger); }
        .status-icon.warning { background: var(--accent-warning); }

        /* Logs Section */
        .logs-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .logs-toolbar {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logs-filter {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logs-filter label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .logs-filter select, .logs-filter input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.375rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .logs-content {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            line-height: 1.5;
        }

        .log-entry {
            display: flex;
            gap: 1rem;
            padding: 0.25rem 0;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-secondary);
            min-width: 140px;
            flex-shrink: 0;
        }

        .log-level {
            min-width: 50px;
            text-align: center;
            padding: 0 0.375rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .log-level.debug { background: #1f6feb33; color: var(--accent-primary); }
        .log-level.info { background: #23863633; color: var(--accent-success); }
        .log-level.warn { background: #f0883e33; color: var(--accent-warning); }
        .log-level.error { background: #da363333; color: var(--accent-danger); }

        .log-message {
            color: var(--text-primary);
            word-break: break-all;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.75rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error-message {
            padding: 1rem;
            background: #da363322;
            border: 1px solid var(--accent-danger);
            border-radius: 8px;
            color: var(--accent-danger);
            font-size: 0.875rem;
        }

        /* Sessions Table */
        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .sessions-table th,
        .sessions-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .sessions-table th {
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.6875rem;
            letter-spacing: 0.025em;
        }

        .sessions-table tr:hover td {
            background: var(--bg-tertiary);
        }

        .sessions-table td {
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 500;
        }

        .badge-primary { background: #1f6feb33; color: var(--accent-primary); }
        .badge-success { background: #23863633; color: var(--accent-success); }
        .badge-warning { background: #f0883e33; color: var(--accent-warning); }

        /* Refresh Button */
        .refresh-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 1s linear infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main { padding: 1rem; }
            .header-content { flex-direction: column; gap: 1rem; }
            .metric-grid { grid-template-columns: 1fr; }
            .logs-toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🐾</div>
                <h1>OpenClaw Systems Dashboard</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="status-indicator">
                    <span class="status-dot" id="connectionStatus"></span>
                    <span id="connectionText">Connecting...</span>
                </div>
                <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
                    <span class="refresh-icon">↻</span>
                    Refresh
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Metrics Grid -->
        <div class="dashboard-grid">
            <!-- System Status Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">System Overview</span>
                    <span class="card-badge" id="versionBadge">-</span>
                </div>
                <div class="card-body">
                    <div class="metric-grid">
                        <div class="metric">
                            <div class="metric-value" id="gatewayStatus">-</div>
                            <div class="metric-label">Gateway</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="sessionCount">-</div>
                            <div class="metric-label">Sessions</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="channelCount">-</div>
                            <div class="metric-label">Channels</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="uptimeValue">-</div>
                            <div class="metric-label">Uptime</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Channels Status -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Channels</span>
                    <span class="card-badge" id="activeChannels">-</span>
                </div>
                <div class="card-body">
                    <div class="status-list" id="channelsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Recent Sessions</span>
                    <span class="card-badge" id="recentBadge">-</span>
                </div>
                <div class="card-body">
                    <div class="status-list" id="sessionsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Health Status -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Health Checks</span>
                    <span class="card-badge" id="healthBadge">-</span>
                </div>
                <div class="card-body">
                    <div class="status-list" id="healthList">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Logs Section -->
        <div class="logs-container">
            <div class="logs-toolbar">
                <span class="card-title" style="margin-right: auto;">Live Logs</span>
                <div class="logs-filter">
                    <label>Level:</label>
                    <select id="logLevelFilter" onchange="filterLogs()">
                        <option value="all">All</option>
                        <option value="debug">Debug</option>
                        <option value="info">Info</option>
                        <option value="warn">Warning</option>
                        <option value="error">Error</option>
                    </select>
                </div>
                <div class="logs-filter">
                    <label>Lines:</label>
                    <select id="logLines" onchange="fetchLogs()">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="250">250</option>
                        <option value="500">500</option>
                    </select>
                </div>
                <div class="logs-filter">
                    <label>
                        <input type="checkbox" id="autoScroll" checked>
                        Auto-scroll
                    </label>
                </div>
            </div>
            <div class="logs-content" id="logsContent">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading logs...
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configuration
        const REFRESH_INTERVAL = 5000; // 5 seconds
        let refreshTimer = null;
        let isRefreshing = false;

        // State
        let currentLogs = [];
        let lastUpdate = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            startAutoRefresh();
        });

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadAllData, REFRESH_INTERVAL);
        }

        async function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            btn.disabled = true;
            
            await loadAllData();
            
            setTimeout(() => {
                btn.classList.remove('spinning');
                btn.disabled = false;
            }, 500);
        }

        async function loadAllData() {
            if (isRefreshing) return;
            isRefreshing = true;

            try {
                await Promise.all([
                    fetchStatus(),
                    fetchSessions(),
                    fetchChannels(),
                    fetchHealth(),
                    fetchLogs()
                ]);
                
                updateConnectionStatus(true);
                lastUpdate = new Date();
            } catch (error) {
                console.error('Failed to load data:', error);
                updateConnectionStatus(false);
            } finally {
                isRefreshing = false;
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionStatus');
            const text = document.getElementById('connectionText');
            
            if (connected) {
                dot.classList.remove('error');
                dot.classList.add('online');
                text.textContent = lastUpdate 
                    ? `Updated ${lastUpdate.toLocaleTimeString()}`
                    : 'Connected';
            } else {
                dot.classList.remove('online');
                dot.classList.add('error');
                text.textContent = 'Disconnected';
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Parse gateway status
                const gatewayText = data.gateway_text || '';
                const isRunning = gatewayText.includes('running') || gatewayText.includes('ok');
                
                document.getElementById('gatewayStatus').textContent = isRunning ? 'RUNNING' : 'STOPPED';
                document.getElementById('gatewayStatus').className = 'metric-value ' + (isRunning ? 'success' : 'danger');
                
                // Try to extract version
                const versionMatch = gatewayText.match(/version[\s:]*([\d.]+)/i);
                document.getElementById('versionBadge').textContent = versionMatch ? versionMatch[1] : 'unknown';
                
                // Try to extract uptime
                const uptimeMatch = gatewayText.match(/uptime[\s:]*([\w\s]+)/i);
                document.getElementById('uptimeValue').textContent = uptimeMatch ? uptimeMatch[1].trim() : '-';
                
            } catch (error) {
                document.getElementById('gatewayStatus').textContent = 'ERROR';
                document.getElementById('gatewayStatus').className = 'metric-value danger';
            }
        }

        async function fetchSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                const sessions = data.sessions?.sessions || [];
                const stores = data.sessions?.stores || [];
                
                document.getElementById('sessionCount').textContent = sessions.length;
                document.getElementById('recentBadge').textContent = sessions.length + ' active';
                
                // Render sessions list
                const container = document.getElementById('sessionsList');
                if (sessions.length === 0) {
                    container.innerHTML = '<div class="status-item"><span>No active sessions</span></div>';
                } else {
                    container.innerHTML = sessions.slice(0, 5).map(s => `
                        <div class="status-item">
                            <div class="status-item-left">
                                <span class="status-icon online"></span>
                                <span>${s.agentId || 'main'}</span>
                            </div>
                            <span class="badge badge-primary">${s.model || 'default'}</span>
                        </div>
                    `).join('');
                }
                
            } catch (error) {
                document.getElementById('sessionCount').textContent = '?';
                document.getElementById('sessionsList').innerHTML = '<div class="error-message">Failed to load sessions</div>';
            }
        }

        async function fetchChannels() {
            try {
                const response = await fetch('/api/channels');
                const data = await response.json();
                
                const raw = data.channels?.raw || '';
                
                // Parse channel info from text output
                const channels = [];
                if (raw.includes('whatsapp') || raw.toLowerCase().includes('whatsapp')) {
                    channels.push({ name: 'WhatsApp', status: raw.includes('connected') || raw.includes('ok') ? 'online' : 'offline' });
                }
                if (raw.includes('telegram') || raw.toLowerCase().includes('telegram')) {
                    channels.push({ name: 'Telegram', status: raw.includes('connected') || raw.includes('ok') ? 'online' : 'offline' });
                }
                if (raw.includes('discord') || raw.toLowerCase().includes('discord')) {
                    channels.push({ name: 'Discord', status: raw.includes('connected') || raw.includes('ok') ? 'online' : 'offline' });
                }
                if (raw.includes('signal') || raw.toLowerCase().includes('signal')) {
                    channels.push({ name: 'Signal', status: raw.includes('connected') || raw.includes('ok') ? 'online' : 'offline' });
                }
                
                // If no channels detected, show placeholder
                if (channels.length === 0) {
                    channels.push({ name: 'WhatsApp', status: 'unknown' });
                    channels.push({ name: 'Telegram', status: 'unknown' });
                }
                
                document.getElementById('channelCount').textContent = channels.length;
                document.getElementById('activeChannels').textContent = channels.filter(c => c.status === 'online').length + ' online';
                
                const container = document.getElementById('channelsList');
                container.innerHTML = channels.map(c => `
                    <div class="status-item">
                        <div class="status-item-left">
                            <span class="status-icon ${c.status}"></span>
                            <span>${c.name}</span>
                        </div>
                        <span class="badge ${c.status === 'online' ? 'badge-success' : c.status === 'warning' ? 'badge-warning' : 'badge-primary'}">${c.status}</span>
                    </div>
                `).join('');
                
            } catch (error) {
                document.getElementById('channelCount').textContent = '?';
                document.getElementById('channelsList').innerHTML = '<div class="error-message">Failed to load channels</div>';
            }
        }

        async function fetchHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const health = data.health || {};
                const isHealthy = !health.error;
                
                document.getElementById('healthBadge').textContent = isHealthy ? 'OK' : 'ISSUES';
                document.getElementById('healthBadge').style.background = isHealthy ? '#23863633' : '#da363333';
                document.getElementById('healthBadge').style.color = isHealthy ? '#3fb950' : '#f85149';
                
                const container = document.getElementById('healthList');
                
                if (health.error) {
                    container.innerHTML = `
                        <div class="status-item">
                            <div class="status-item-left">
                                <span class="status-icon offline"></span>
                                <span>Gateway Health Check</span>
                            </div>
                            <span class="badge badge-warning">Failed</span>
                        </div>
                        <div style="padding: 0.5rem; font-size: 0.75rem; color: var(--text-secondary);">${health.error}</div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="status-item">
                            <div class="status-item-left">
                                <span class="status-icon online"></span>
                                <span>Gateway Health Check</span>
                            </div>
                            <span class="badge badge-success">OK</span>
                        </div>
                        <div class="status-item">
                            <div class="status-item-left">
                                <span class="status-icon online"></span>
                                <span>RPC Probe</span>
                            </div>
                            <span class="badge badge-success">OK</span>
                        </div>
                    `;
                }
                
            } catch (error) {
                document.getElementById('healthBadge').textContent = 'ERROR';
                document.getElementById('healthList').innerHTML = '<div class="error-message">Failed to check health</div>';
            }
        }

        async function fetchLogs() {
            try {
                const lines = document.getElementById('logLines').value;
                const response = await fetch(`/api/logs?lines=${lines}`);
                const data = await response.json();
                
                currentLogs = data.logs || [];
                renderLogs();
                
            } catch (error) {
                document.getElementById('logsContent').innerHTML = '<div class="error-message">Failed to load logs</div>';
            }
        }

        function renderLogs() {
            const levelFilter = document.getElementById('logLevelFilter').value;
            const container = document.getElementById('logsContent');
            const autoScroll = document.getElementById('autoScroll').checked;
            
            const filtered = levelFilter === 'all' 
                ? currentLogs 
                : currentLogs.filter(l => (l.level || '').toLowerCase() === levelFilter);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No logs to display</div>';
                return;
            }
            
            container.innerHTML = filtered.map(log => {
                const level = (log.level || 'info').toLowerCase();
                const time = log.timestamp || '-';
                const message = escapeHtml(log.message || log.raw || '');
                
                return `
                    <div class="log-entry">
                        <span class="log-time">${time}</span>
                        <span class="log-level ${level}">${level}</span>
                        <span class="log-message">${message}</span>
                    </div>
                `;
            }).join('');
            
            if (autoScroll) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function filterLogs() {
            renderLogs();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
