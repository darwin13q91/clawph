version: '3.8'

# Multi-agent restaurant business infrastructure
# Run on solar-powered Ubuntu laptop

services:
  # Reverse proxy - routes traffic to each agent
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - agent-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Italian Bistro Agent
  italian-bistro:
    image: openclaw/agent:latest
    container_name: italian-bistro
    environment:
      - AGENT_ID=italian-bistro
      - AGENT_NAME=Bella Notte
      - PORT=18790
      - SHARED_SKILLS_PATH=/skills/shared
      - CUSTOM_SKILLS_PATH=/skills/custom
      - DATA_PATH=/data
    volumes:
      - ../shared-skills:/skills/shared:ro
      - ./agents/italian-bistro/skills:/skills/custom:ro
      - ./agents/italian-bistro/data:/data
    ports:
      - "18790:18790"
    restart: unless-stopped
    networks:
      - agent-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Coffee Corner Agent
  coffee-corner:
    image: openclaw/agent:latest
    container_name: coffee-corner
    environment:
      - AGENT_ID=coffee-corner
      - AGENT_NAME=Coffee Corner
      - PORT=18791
      - SHARED_SKILLS_PATH=/skills/shared
      - CUSTOM_SKILLS_PATH=/skills/custom
      - DATA_PATH=/data
    volumes:
      - ../shared-skills:/skills/shared:ro
      - ./agents/coffee-corner/skills:/skills/custom:ro
      - ./agents/coffee-corner/data:/data
    ports:
      - "18791:18791"
    restart: unless-stopped
    networks:
      - agent-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18791/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Beach Resort Agent
  beach-resort:
    image: openclaw/agent:latest
    container_name: beach-resort
    environment:
      - AGENT_ID=beach-resort
      - AGENT_NAME=Azure Shores Resort
      - PORT=18792
      - SHARED_SKILLS_PATH=/skills/shared
      - CUSTOM_SKILLS_PATH=/skills/custom
      - DATA_PATH=/data
    volumes:
      - ../shared-skills:/skills/shared:ro
      - ./agents/beach-resort/skills:/skills/custom:ro
      - ./agents/beach-resort/data:/data
    ports:
      - "18792:18792"
    restart: unless-stopped
    networks:
      - agent-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18792/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Monitoring - lightweight
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: solar-laptop
    ports:
      - "19999:19999"
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    restart: unless-stopped
    networks:
      - agent-network
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

networks:
  agent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
