# OpenClaw Clean Architecture Config
# Based on user's specification - March 2, 2026

# === ENVIRONMENT VARIABLES REQUIRED ===
# TELEGRAM_BOT_TOKEN_ADMIN=xxx
# TELEGRAM_BOT_TOKEN_ALERTS=xxx  
# TELEGRAM_BOT_TOKEN_BOBS=xxx
# OPENCLAW_GATEWAY_TOKEN=xxx
# KIMI_API_KEY=xxx
# OPENAI_API_KEY=xxx (optional)

# === AGENTS ===
agents:
  # MASTER AGENT - You (Allysa)
  master:
    id: "allysa"
    name: "Allysa"
    description: "Master operator controlling all systems"
    model: "kimi-coding/k2p5"
    workspace: "~/.openclaw/workspace"
    tools: ["agents_list", "web_search", "web_fetch", "exec"]
    
  # TRADING AGENT
  trading:
    id: "trading-agent"
    name: "Trading Agent"
    description: "Automated trading and market analysis"
    model: "kimi-coding/k2p5"
    workspace: "~/.openclaw/workspace/skills/market-scanner"
    tools: ["exec", "file_read", "file_write"]
    
  # CFO AGENT
  cfo:
    id: "cfo-agent"
    name: "CFO Agent"
    description: "Financial tracking and reporting"
    model: "kimi-coding/k2p5"
    workspace: "~/.openclaw/workspace/finance"
    tools: ["file_read", "file_write", "web_fetch"]
    
  # CLIENT AGENTS (One per business)
    # Option 1: Use OpenAI (recommended for clients)
    model: "openai/gpt-4o-mini"
    # Option 2: Use Kimi (if API key works)
    # model: "kimi-coding/k2p5"
    context:
      business_type: "Italian Restaurant"
      hours: "11 AM - 10 PM daily"
      specialties: ["Pasta", "Pizza", "Wine"]
    tools: ["web_search"]  # For looking up info
    
  # Add more clients here:
  # janes-boutique:
  #   id: "janes-boutique"
  #   name: "Jane's Boutique"
  #   model: "openai/gpt-4o-mini"
  #   workspace: "~/.openclaw/agents/janes-boutique"

# === CHANNELS (Telegram) ===
channels:
  telegram:
    enabled: true
    dmPolicy: "pairing"
    
    accounts:
      # Admin/Main Bot (You)
      admin:
        name: "Amajungle Admin"
        botToken: "${TELEGRAM_BOT_TOKEN_ADMIN}"
        
      # Alerts Only
      alerts:
        name: "Amajungle Alerts"
        botToken: "${TELEGRAM_BOT_TOKEN_ALERTS}"
        
      # Client Bots
        botToken: "${TELEGRAM_BOT_TOKEN_BOBS}"
        
    # Routing: Which Telegram account goes to which agent
    bindings:
      # Admin messages → Master (You)
      - account: admin
        agent: master
        
      # Alert messages → Master (for monitoring)
      - account: alerts
        agent: master
        
      # Bob's customers → Bob's agent
        
      # Add more bindings as you add clients:
      # - account: janes
      #   agent: janes-boutique

# === SESSIONS ===
session:
  # CRITICAL: Isolate each user's DMs
  dmScope: "per-channel-peer"
  
  # Auto-reset sessions
  reset:
    mode: "daily"
    atHour: 4
    idleMinutes: 120
    
  # Cleanup old sessions
  maintenance:
    mode: "enforce"
    pruneAfter: "30d"
    maxEntries: 500

# === AGENT COMMUNICATION ===
tools:
  # Allow agents to talk to each other
  agentToAgent:
    enabled: true
    allow: ["master", "trading", "cfo"]  # Only these can cross-talk
    
  # Web capabilities
  web:
    search:
      enabled: true
    fetch:
      enabled: true
      
  # Command execution
  exec:
    timeoutSec: 1800  # 30 min for long operations
    
# === SCHEDULING ===
cron:
  enabled: true
  maxConcurrentRuns: 2
  
  jobs:
    # Morning Report
    - name: "morning-report"
      schedule: "0 6 * * *"  # 6 AM daily
      command: "~/workspace/scripts/morning-report.sh"
      agent: "master"
      
    # Trading Scan
    - name: "trading-scan"
      schedule: "*/30 8-22 * * *"  # Every 30 min, 8AM-10PM
      command: "~/workspace/skills/market-scanner/scan.py"
      agent: "trading"
      
    # Overnight Thinking
    - name: "overnight-thinking"
      schedule: "0 21 * * *"  # 9 PM daily
      command: "~/workspace/brain/overnight/think.sh"
      agent: "master"
      
    # CFO Report (1st & 15th)
    - name: "cfo-report"
      schedule: "0 8 1,15 * *"
      command: "~/workspace/scripts/cfo-report.sh"
      agent: "cfo"

# === GATEWAY ===
gateway:
  port: 18789
  bind: "loopback"
  
  auth:
    mode: "token"
    token: "${OPENCLAW_GATEWAY_TOKEN}"
    
  controlUi:
    enabled: true
    
# === MODELS ===
models:
  providers:
    # Kimi (Your Allegretto Plan)
    kimi-coding:
      baseUrl: "https://api.kimi.com/coding"
      apiKey: "${KIMI_API_KEY}"
      models:
        - id: "k2p5"
          name: "Kimi K2.5"
          
    # OpenAI (For Client Bots - Recommended)
    openai:
      baseUrl: "https://api.openai.com/v1"
      apiKey: "${OPENAI_API_KEY}"
      models:
        - id: "gpt-4o-mini"
          name: "GPT-4o Mini"
          costPer1k: 0.0015  # $0.0015 per 1k tokens
          
# === DEFAULTS ===
defaults:
  agent: "master"
  model: "kimi-coding/k2p5"
  workspace: "~/.openclaw/workspace"
